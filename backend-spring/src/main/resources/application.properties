# ============ DATABASE (Supabase PostgreSQL) ============
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============ JPA/Hibernate ============
# ???????? ? validate ?? update, ????? Hibernate ????????????? ??????? ????? ??????? (elo, streak, wins ? ??.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============ SERVER ============
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api/v1

# ============ FIREBASE ============
firebase.config.project-id=${FIREBASE_PROJECT_ID}
firebase.config.database-url=${FIREBASE_DATABASE_URL}
firebase.config.credentials-path=${FIREBASE_CREDENTIALS_PATH:/config/firebase-adminsdk.json}

# ============ SUPABASE ============
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}

# ============ JACKSON ============
spring.jackson.default-property-inclusion=non_null

# ============ LOGGING ============
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.codequest=${LOGGING_LEVEL_COM_CODEQUEST:DEBUG}
logging.level.org.springframework.web=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/codequest.log

# ============ SWAGGER/OPENAPI ============
springdoc.api-docs.path=/docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
server.address=0.0.0.0
spring.security.enabled=false
